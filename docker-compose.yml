services:
  neuroblock:
    build: .
    ports:
      - "8080:8080"
    environment:
      - FLASK_CONFIG=production
      - PORT=8080
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
    volumes:
      - ./exports:/app/exports
    restart: unless-stopped
