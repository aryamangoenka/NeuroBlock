version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./exports:/app/exports
    environment:
      - FLASK_CONFIG=production
      - PORT=5000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped 