steps:
  # Build the backend container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/dnd-neural-backend:latest",
        "-f",
        "backend/Dockerfile",
        ".",
      ]

  # Push the backend container image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/dnd-neural-backend:latest"]

  # Deploy backend to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "dnd-neural-backend"
      - "--image=gcr.io/$PROJECT_ID/dnd-neural-backend:latest"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--set-env-vars=FLASK_CONFIG=custom_domain,SESSION_CLEANUP_INTERVAL=12,SESSION_MAX_AGE=168,GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
      - "--update-secrets=SECRET_KEY=flask-secret-key:latest"
    secretEnv: ["SECRET_KEY"]

# Secret Manager integration for secure session keys
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/flask-secret-key/versions/latest
      env: "SECRET_KEY"

images:
  - "gcr.io/$PROJECT_ID/dnd-neural-backend:latest"

timeout: 1800s
