# NeuroBlock — Cloud Build: single-container deploy to Cloud Run.
# (Optional GCP path; see docs/DEPLOYMENT.md for the AWS EC2 path.)
#
# Run with: gcloud builds submit --config cloudbuild.yaml

substitutions:
  _REGION: us-central1
  _REPO: neuroblock

steps:
  - id: build
    name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:latest
      - .

  - id: push
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:latest"]

  - id: deploy
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - neuroblock
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:latest
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=4Gi
      - --cpu=2
      - --timeout=3600
      - --max-instances=1
      - --session-affinity
      - --set-env-vars=FLASK_CONFIG=production,SESSION_CLEANUP_INTERVAL=12,SESSION_MAX_AGE=168,GOOGLE_CLOUD_PROJECT=$PROJECT_ID
      - --update-secrets=SECRET_KEY=flask-secret-key:latest

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:latest"

timeout: 2400s
