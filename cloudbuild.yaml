steps:
  # Build the backend container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/dnd-neural-backend:latest",
        "-f",
        "backend/Dockerfile",
        ".",
      ]

  # Push the backend container image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/dnd-neural-backend:latest"]

  # Deploy backend to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "dnd-neural-backend"
      - "--image=gcr.io/$PROJECT_ID/dnd-neural-backend:latest"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"

images:
  - "gcr.io/$PROJECT_ID/dnd-neural-backend:latest"

timeout: 1800s
