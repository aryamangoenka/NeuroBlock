<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Debug Test</title>
</head>
<body>
    <h1>Session Debug Test</h1>
    
    <div>
        <button onclick="testSession()">Test Session & Directory Structure</button>
        <button onclick="testCustomDatasets()">Test Custom Datasets Endpoint</button>
        <button onclick="testAvailableDatasets()">Test Available Datasets Endpoint</button>
    </div>

    <div>
        <h2>Debug Logs</h2>
        <div id="logs" style="background: #f0f0f0; padding: 10px; height: 500px; overflow-y: scroll; font-family: monospace; white-space: pre-wrap;"></div>
    </div>

    <script>
        const API_BASE_URL = 'https://dnd-neural-backend-b54v6cczaa-uc.a.run.app';
        
        function log(message) {
            const logs = document.getElementById('logs');
            logs.textContent += `[${new Date().toLocaleTimeString()}] ${message}\n`;
            logs.scrollTop = logs.scrollHeight;
            console.log(message);
        }

        async function testSession() {
            log('🔍 Testing session and directory structure...');
            
            try {
                // First, make a request to establish a session
                const healthResponse = await fetch(`${API_BASE_URL}/health`, {
                    credentials: 'include'
                });
                const healthData = await healthResponse.json();
                log(`🏥 Health: ${JSON.stringify(healthData)}`);

                // Test the custom datasets endpoint which should create session directories
                const customResponse = await fetch(`${API_BASE_URL}/api/datasets/custom`, {
                    method: 'GET',
                    credentials: 'include'
                });
                const customData = await customResponse.json();
                log(`📂 Custom datasets response: ${JSON.stringify(customData, null, 2)}`);

                // Test the available datasets endpoint  
                const availableResponse = await fetch(`${API_BASE_URL}/api/datasets/available`, {
                    method: 'GET',
                    credentials: 'include'
                });
                const availableData = await availableResponse.json();
                log(`📋 Available datasets response: ${JSON.stringify(availableData, null, 2)}`);

                // Check if the responses are consistent
                const customCount = customData.datasets ? customData.datasets.length : 0;
                const availableCustomCount = availableData.datasets && availableData.datasets.custom ? availableData.datasets.custom.length : 0;
                
                log(`🔢 Custom datasets count: ${customCount}`);
                log(`🔢 Available custom count: ${availableCustomCount}`);
                
                if (customCount !== availableCustomCount) {
                    log(`⚠️ INCONSISTENCY: Custom endpoint shows ${customCount} but available shows ${availableCustomCount}`);
                } else {
                    log(`✅ Consistency check passed`);
                }

            } catch (error) {
                log(`💥 Error: ${error.message}`);
            }
        }

        async function testCustomDatasets() {
            log('📂 Testing /api/datasets/custom endpoint...');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/datasets/custom`, {
                    method: 'GET',
                    credentials: 'include'
                });
                
                const data = await response.json();
                log(`Response: ${JSON.stringify(data, null, 2)}`);
                
                if (data.datasets && Array.isArray(data.datasets)) {
                    log(`Found ${data.datasets.length} custom datasets:`);
                    data.datasets.forEach((dataset, index) => {
                        log(`  ${index + 1}. ${dataset.name} (${dataset.task_type})`);
                    });
                } else {
                    log(`❌ Unexpected response structure`);
                }

            } catch (error) {
                log(`💥 Error: ${error.message}`);
            }
        }

        async function testAvailableDatasets() {
            log('📋 Testing /api/datasets/available endpoint...');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/datasets/available`, {
                    method: 'GET',
                    credentials: 'include'
                });
                
                const data = await response.json();
                log(`Response: ${JSON.stringify(data, null, 2)}`);
                
                if (data.datasets) {
                    log(`Built-in datasets: ${data.datasets.built_in ? data.datasets.built_in.length : 0}`);
                    log(`Custom datasets: ${data.datasets.custom ? data.datasets.custom.length : 0}`);
                    log(`All names: ${data.datasets.all_names ? data.datasets.all_names.length : 0}`);
                    
                    if (data.datasets.custom && data.datasets.custom.length > 0) {
                        log(`Custom datasets found:`);
                        data.datasets.custom.forEach((dataset, index) => {
                            log(`  ${index + 1}. ${dataset.name} (${dataset.task_type})`);
                        });
                    }
                } else {
                    log(`❌ Unexpected response structure`);
                }

            } catch (error) {
                log(`💥 Error: ${error.message}`);
            }
        }

        // Auto-run tests on page load
        window.onload = function() {
            log('🚀 Starting session debug tests...\n');
            setTimeout(() => testSession(), 500);
        };
    </script>
</body>
</html>
