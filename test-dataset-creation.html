<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset Creation Test</title>
</head>
<body>
    <h1>Dataset Creation Test</h1>
    
    <div>
        <h2>Step 1: Test Dataset Creation</h2>
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" />
        <br><br>
        <input type="text" id="datasetName" placeholder="Dataset Name" value="test-dataset" />
        <br><br>
        <input type="text" id="targetColumn" placeholder="Target Column" value="target" />
        <br><br>
        <select id="taskType">
            <option value="classification">Classification</option>
            <option value="regression">Regression</option>
        </select>
        <br><br>
        <button onclick="testDatasetCreation()">Create Dataset</button>
    </div>

    <div>
        <h2>Step 2: Test Available Datasets</h2>
        <button onclick="testAvailableDatasets()">Get Available Datasets</button>
    </div>

    <div>
        <h2>Logs</h2>
        <div id="logs" style="background: #f0f0f0; padding: 10px; height: 400px; overflow-y: scroll; font-family: monospace;"></div>
    </div>

    <script>
        const API_BASE_URL = 'https://dnd-neural-backend-b54v6cczaa-uc.a.run.app';
        
        function log(message) {
            const logs = document.getElementById('logs');
            logs.innerHTML += `[${new Date().toLocaleTimeString()}] ${message}\n`;
            logs.scrollTop = logs.scrollHeight;
            console.log(message);
        }

        async function testDatasetCreation() {
            const fileInput = document.getElementById('fileInput');
            const datasetName = document.getElementById('datasetName').value;
            const targetColumn = document.getElementById('targetColumn').value;
            const taskType = document.getElementById('taskType').value;

            if (!fileInput.files[0]) {
                log('❌ Please select a file first');
                return;
            }

            const file = fileInput.files[0];
            log(`🔍 Testing dataset creation with file: ${file.name}`);

            try {
                // Step 1: Preview the dataset
                log('📋 Step 1: Previewing dataset...');
                const previewFormData = new FormData();
                previewFormData.append('file', file);

                const previewResponse = await fetch(`${API_BASE_URL}/api/datasets/preview`, {
                    method: 'POST',
                    credentials: 'include',
                    body: previewFormData
                });

                const previewData = await previewResponse.json();
                log(`📊 Preview response: ${JSON.stringify(previewData, null, 2)}`);

                if (!previewResponse.ok) {
                    log(`❌ Preview failed: ${previewData.error}`);
                    return;
                }

                // Step 2: Create the dataset
                log('🏗️ Step 2: Creating dataset...');
                const createFormData = new FormData();
                createFormData.append('file', file);
                createFormData.append('dataset_name', datasetName);
                createFormData.append('target_column', targetColumn);
                createFormData.append('task_type', taskType);
                
                // Fix: Extract columns from the correct path in the response
                const columns = previewData.data.columns;
                const featureColumns = columns.filter(col => col !== targetColumn);
                log(`📋 Available columns: ${columns.join(', ')}`);
                log(`🎯 Target column: ${targetColumn}`);
                log(`⚙️ Feature columns: ${featureColumns.join(', ')}`);
                
                createFormData.append('feature_columns', JSON.stringify(featureColumns));

                const createResponse = await fetch(`${API_BASE_URL}/api/datasets/create`, {
                    method: 'POST',
                    credentials: 'include',
                    body: createFormData
                });

                const createData = await createResponse.json();
                log(`🎯 Create response: ${JSON.stringify(createData, null, 2)}`);

                if (createResponse.ok) {
                    log('✅ Dataset created successfully!');
                } else {
                    log(`❌ Dataset creation failed: ${createData.error}`);
                }

            } catch (error) {
                log(`💥 Error: ${error.message}`);
            }
        }

        async function testAvailableDatasets() {
            log('🔍 Testing available datasets...');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/datasets/available`, {
                    method: 'GET',
                    credentials: 'include'
                });

                const data = await response.json();
                log(`📦 Available datasets response: ${JSON.stringify(data, null, 2)}`);

                if (response.ok) {
                    log(`✅ Found ${data.datasets.custom.length} custom datasets`);
                    data.datasets.custom.forEach(dataset => {
                        log(`  📊 ${dataset.name} (${dataset.task_type})`);
                    });
                } else {
                    log(`❌ Failed to get datasets: ${data.error}`);
                }

            } catch (error) {
                log(`💥 Error: ${error.message}`);
            }
        }

        // Test connection on page load
        window.onload = async function() {
            log('🚀 Testing connection to backend...');
            try {
                const response = await fetch(`${API_BASE_URL}/health`, {
                    credentials: 'include'
                });
                const data = await response.json();
                log(`🏥 Health check: ${JSON.stringify(data)}`);
            } catch (error) {
                log(`💥 Connection failed: ${error.message}`);
            }
        };
    </script>
</body>
</html>
